name: Update
on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *" # every 24 hours
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Generate README.md
        uses: teoxoy/profile-readme-stats@master
        with:
          token: ${{ secrets.USER_TOKEN }}
      - uses: agmmnn/vibe-meter@v1
        with:
          gist-id: "3e0ea07be699f86d94a5e04eb2bf9f94"
        env:
          GH_TOKEN: ${{ secrets.USER_TOKEN }}
      - name: Update vibe-meter text
        run: python3 scripts/stats_text.py /tmp/vibe-meter-stats.json --replace README.md
      - name: Update README.md
        shell: bash
        run: |
          if [[ "$(git status --porcelain)" != "" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add *.md *.svg
            git commit -m "Update README.md"
            git push
          fi
      - name: Update Blog Posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # feed_list: "https://agmmnn.dev/rss.xml"
          feed_list: "https://medium.com/feed/@agmmnn"
          max_post_count: 3
